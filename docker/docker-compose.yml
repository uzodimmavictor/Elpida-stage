services:
  psql:
    build:
      context: ./images
      dockerfile: postgres.Dockerfile
    image: custom-postgres:latest
    container_name: p_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./ssl:/var/lib/postgresql/ssl:ro
      - ../database/fake_database.sql:/docker-entrypoint-initdb.d/01_fake_database.sql:ro
    command: >
      postgres
      -c timezone=UTC
    restart: unless-stopped

  influxdb:
    build:
      context: ./images
      dockerfile: influxdb.Dockerfile
    image: custom-influxdb:1.8.3
    container_name: i_container
    environment:
      INFLUXDB_DB: dbinflux
      INFLUXDB_ADMIN_USER: ADMIN
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-adminpassword}
      INFLUXDB_USER: influx
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_USER_PASSWORD:-influxpassword}
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb_data:/var/lib/influxdb
      - ./ssl:/etc/influxdb/ssl
    restart: unless-stopped

  redis:
    build:
      context: ./images
      dockerfile: redis.Dockerfile

    image: custom-redis:7
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
    volumes:
      - ./redis_data:/data
      - ./users.acl:/usr/local/etc/redis/users.acl
    command: >
      redis-server --appendonly yes
      --aclfile /usr/local/etc/redis/users.acl
      --maxmemory 1gb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      # Configuration KRaft
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Cluster ID (généré une seule fois)
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      # Réplication (single node)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    restart: unless-stopped
